<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký - BookHub Library</title>
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/auth.css">
</head>
<body>

    <div class="auth-wrapper">
        <div class="auth-brand">
            <div class="logo">BH</div>
            <h2>Đăng ký BookHub</h2>
            <p>Tạo tài khoản để mượn sách và đọc online</p>
        </div>

        <div id="message-box" style="display: none; padding: 12px; border-radius: 12px; text-align: center; margin-bottom: 16px; font-weight: 600; font-size: 0.9rem;">
        </div>

        <form id="registerForm" class="form-grid">
            <div class="field">
                <label for="fullName">Họ và tên</label>
                <input type="text" id="fullName" name="fullName" placeholder="Nhập họ tên của bạn" required>
            </div>

            <div class="field">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="Ví dụ: sinhvien@stu.ptit.edu.vn" required>
            </div>
            
            <div class="field">
                <label for="password">Mật khẩu</label>
                <input type="password" id="password" name="password" placeholder="Tạo mật khẩu an toàn" required>
            </div>

            <div class="field">
                <label for="confirmPassword">Xác nhận mật khẩu</label>
                <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Nhập lại mật khẩu" required>
            </div>

            <button type="submit" class="btn primary">Tạo tài khoản</button>
        </form>

        <div class="auth-links">
            Đã có tài khoản? <a href="login.html">Đăng nhập ngay</a>
        </div>
    </div>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    </body>
</html>
