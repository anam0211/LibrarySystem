<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thông tin cá nhân - Thư viện PTIT</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark navbar-custom shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/dashboard">📚 Thư viện PTIT</a>
            <div class="d-flex align-items-center">
                <button class="btn btn-outline-light btn-sm" onclick="logout()">Đăng xuất</button>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow-sm border-0">
                    <div class="card-header text-white text-center py-3" style="background-color: #198754;">
                        <h4 class="mb-0">Hồ Sơ Của Bạn</h4>
                    </div>
                    <div class="card-body p-4">
                        <div class="mb-3 border-bottom pb-2">
                            <label class="form-label text-muted small text-uppercase fw-bold">Họ và tên</label>
                            <p class="fs-5 fw-bold text-dark" id="profileName">Đang tải...</p>
                        </div>
                        <div class="mb-3 border-bottom pb-2">
                            <label class="form-label text-muted small text-uppercase fw-bold">Email đăng nhập</label>
                            <p class="fs-5 text-dark" id="profileEmail">Đang tải...</p>
                        </div>
                        <div class="mb-4">
                            <label class="form-label text-muted small text-uppercase fw-bold">Vai trò trong hệ thống</label>
                            <p class="fs-5"><span class="badge" id="profileRole">Đang tải...</span></p>
                        </div>
                        <div class="text-center mt-4">
                            <a href="/dashboard" class="btn btn-outline-success px-4 rounded-pill">⬅ Quay lại Bảng điều khiển</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="/js/utils.js"></script>     
    <script src="/js/profile.js"></script>  
</body>
</html>
