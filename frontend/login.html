<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - BookHub Library</title>
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/auth.css">
</head>
<body>

    <div class="auth-wrapper">
        <div class="auth-brand">
            <div class="logo">BH</div>
            <h2>Đăng nhập BookHub</h2>
            <p>Truy cập không gian thư viện của bạn</p>
        </div>

        <div id="error-message" style="display: none; background: rgba(239, 107, 115, 0.14); color: var(--red); padding: 12px; border-radius: 12px; text-align: center; margin-bottom: 16px; font-weight: 600; font-size: 0.9rem;">
            Sai email hoặc mật khẩu!
        </div>

        <form id="loginForm" class="form-grid">
            <div class="field">
                <label for="email">Email tài khoản</label>
                <input type="email" id="email" name="email" placeholder="Nhập email của bạn" required>
            </div>
            
            <div class="field">
                <label for="password">Mật khẩu</label>
                <input type="password" id="password" name="password" placeholder="Nhập mật khẩu" required>
            </div>

            <button type="submit" class="btn primary">Đăng nhập</button>
        </form>

        <div class="auth-links">
            Chưa có tài khoản? <a href="register.html">Đăng ký ngay</a>
        </div>
    </div>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    </body>
</html>
