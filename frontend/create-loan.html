<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tạo phiếu mượn - BookHub</title>
    
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/main.css?v=999">

    <script src="js/utils.js?v=2"></script>
    <script>requireAuth();</script>
</head>
<body>
    <div class="app">
        <div id="sidebar-container"></div>

        <main class="content">
            <div id="topbar-container"></div>

            <section class="page active" id="create-loan">
                <div class="section-head">
                    <div>
                        <p class="eyebrow">Quản lý mượn trả</p>
                        <h2>Tạo phiếu mượn mới</h2>
                    </div>
                    <div class="actions">
                        <a href="loans.html" class="btn secondary" style="text-decoration: none;">← Quay lại danh sách</a>
                    </div>
                </div>

                <div id="loan-message" style="display: none; padding: 12px 16px; border-radius: 12px; margin-bottom: 18px; font-weight: 600; font-size: 0.9rem;"></div>

                <div class="info-card" style="max-width: 900px;">
                    <form id="createLoanForm">
                        <div class="form-grid">
                            <div class="field">
                                <label for="readerId">Mã độc giả (Email hoặc ID)</label>
                                <input type="text" id="readerId" required placeholder="Nhập email...">
                            </div>

                            <div class="field">
                                <label for="bookId">Mã sách (ISBN)</label>
                                <input type="text" id="bookId" required placeholder="Nhập mã sách cần mượn...">
                            </div>

                            <div class="field">
                                <label for="borrowDate">Ngày mượn</label>
                                <input type="date" id="borrowDate" required>
                            </div>

                            <div class="field">
                                <label for="dueDate">Hạn trả (Mặc định 14 ngày)</label>
                                <input type="date" id="dueDate" required>
                            </div>

                            <div class="field span-2">
                                <label for="loanNote">Ghi chú thêm (Yêu cầu...)</label>
                                <textarea id="loanNote" placeholder=""></textarea>
                            </div>
                        </div>

                        <div style="margin-top: 24px; display: flex; gap: 12px; justify-content: flex-end; border-top: 1px solid var(--line); padding-top: 18px;">
                            <button type="button" class="btn secondary" onclick="window.location.href='loans.html'">Hủy bỏ</button>
                            <button type="submit" class="btn primary">Xác nhận tạo phiếu</button>
                        </div>
                    </form>
                </div>
            </section>
        </main>
    </div>

    <script src="js/api.js"></script>
    <script src="js/profile.js"></script>
    <script src="js/pages/create-loan.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            initLayout(); 
        });
    </script>
</body>
</html>
