<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Thư viện PTIT</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark navbar-custom">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/dashboard">📚 Thư viện PTIT</a>
            <div class="d-flex align-items-center">
                <span class="navbar-text text-white me-3" id="userNameDisplay"></span>
                
                <a href="/profile" class="btn btn-outline-light btn-sm me-2">Thông tin</a>
                
                <button class="btn btn-outline-light btn-sm" onclick="logout()">Đăng xuất</button>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <h2 class="mb-4">Chào mừng trở lại! 👋</h2>
        <div class="row">
            <div class="col-md-4 mb-3">
                <div class="card dashboard-card h-100 border-success">
                    <div class="card-body text-center">
                        <h1 class="display-4">📖</h1>
                        <h5 class="card-title mt-3">Quản lý Mượn - Trả</h5>
                        <p class="card-text text-muted">Lập phiếu mượn, trả sách.</p>
                        <a href="/loans" class="btn btn-success mt-2">Truy cập</a>
                    </div>
                </div>
            </div>
            <div class="col-md-4 mb-3" id="adminPanel" style="display: none;">
                <div class="card dashboard-card h-100 border-danger">
                    <div class="card-body text-center">
                        <h1 class="display-4">👥</h1>
                        <h5 class="card-title mt-3">Quản lý Người dùng</h5>
                        <p class="card-text text-muted">Phân quyền, khóa thẻ.</p>
                        <a href="/users" class="btn btn-danger mt-2">Quản trị</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="/js/utils.js"></script>
    <script src="/js/dashboard.js"></script>
</body>
</html>
