<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Không tìm thấy trang - Thư viện PTIT</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link rel="stylesheet" href="/css/style.css">
</head>
<body class="auth-body">

    <div class="auth-card text-center" style="max-width: 500px;">
        <h1 class="display-1 fw-bold text-success mb-3">404</h1>
        
        <h3 class="mb-3">Ôi không! Lạc đường rồi... 🛸</h3>
        
        <p class="text-muted mb-4">
            Trang bạn đang tìm kiếm không tồn tại, đã bị xóa hoặc bạn không có quyền truy cập. 
            Đừng lo, hãy quay về nơi bắt đầu nhé!
        </p>
        
        <div class="d-flex justify-content-center gap-3">
            <button onclick="goBack()" class="btn btn-outline-secondary px-4 py-2">Quay lại</button>
            <a href="/" class="btn btn-custom px-4 py-2">Về Trang Chủ</a>
        </div>
    </div>

    <script>
        function goBack() {
            window.history.back(); // Lùi lại 1 trang trong lịch sử trình duyệt
        }
    </script>
    
</body>
</html>
